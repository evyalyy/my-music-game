services:
  - type: web
    name: my-music-game
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 30 server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
