<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.6;
      text-align: center;
      padding: 0 1rem;
    }

    #btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #1db954;
      cursor: pointer;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    #btn:active { transform: scale(0.93); }
    #btn:disabled { background: #444; cursor: default; }
  </style>
</head>
<body>

<div id="status">Loading…</div>
<button id="btn" disabled>▶</button>

<script>
  let SPOTIFY_CLIENT_ID;
  const REDIRECT_URI = `${location.origin}/play.html`;

  const status = document.getElementById('status');
  const btn = document.getElementById('btn');

  // ── Entry point ──────────────────────────────────────────────────────────

  async function main() {
    const config = await fetch('/config').then(r => r.json());
    SPOTIFY_CLIENT_ID = config.spotifyClientId;

    const params = new URLSearchParams(location.search);

    if (params.has('code')) {
      const songId = sessionStorage.getItem('pending_song_id');
      status.textContent = 'Connecting to Spotify…';
      const data = await exchangeCode(params.get('code'));
      if (data.error) { status.textContent = `Auth error: ${data.error}`; return; }
      storeToken(data);
      history.replaceState({}, '', `${location.pathname}?id=${songId}`);
      await playSong(songId);
      return;
    }

    const songId = params.get('id');
    if (!songId) { status.textContent = 'No song ID in URL.'; return; }
    await playSong(songId);
  }

  async function playSong(songId) {
    let songs;
    try {
      songs = await fetch('songs.json').then(r => r.json());
    } catch (e) {
      status.textContent = `Error loading songs: ${e}`;
      return;
    }

    const song = songs.find(s => s.id === songId);
    if (!song) { status.textContent = `Song not found (id=${songId})`; return; }

    if (song.service === 'spotify') {
      await initSpotify(song);
    } else {
      await initYouTube(song);
    }
  }

  // ── YouTube ───────────────────────────────────────────────────────────────

  async function initYouTube(song) {
    const audio = new Audio();
    audio.preload = 'auto';

    audio.addEventListener('playing', () => { btn.textContent = '⏸'; status.textContent = 'Playing…'; });
    audio.addEventListener('pause',   () => { btn.textContent = '▶'; status.textContent = 'Paused'; });
    audio.addEventListener('ended',   () => { btn.textContent = '▶'; status.textContent = 'Ended'; });
    audio.addEventListener('error',   () => { status.textContent = 'Playback error'; });

    status.textContent = 'Fetching audio…';
    try {
      const data = await fetch(`/audio?ytId=${song.youtubeId}`).then(r => r.json());
      if (data.error) { status.textContent = `Error: ${data.error}`; return; }
      audio.src = data.url;
    } catch (e) {
      status.textContent = `Error: ${e}`;
      return;
    }

    status.textContent = 'Ready';
    btn.disabled = false;
    btn.addEventListener('click', () => audio.paused ? audio.play() : audio.pause());
  }

  // ── Spotify ───────────────────────────────────────────────────────────────

  async function initSpotify(song) {
    const token = getValidToken();
    if (!token) {
      status.textContent = 'Redirecting to Spotify…';
      await startSpotifyAuth(new URLSearchParams(location.search).get('id'));
      return;
    }

    status.textContent = 'Connecting to Spotify…';
    await loadSpotifySDK();

    const player = new Spotify.Player({
      name: 'Music Game',
      getOAuthToken: cb => cb(token),
      volume: 1.0,
    });

    player.addListener('ready', async ({ device_id }) => {
      const res = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${device_id}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris: [`spotify:track:${song.spotifyId}`] }),
      });
      if (res.status === 403) {
        status.textContent = 'Spotify Premium required.';
        return;
      }
      status.textContent = 'Ready';
      btn.disabled = false;
      btn.addEventListener('click', async () => {
        const state = await player.getCurrentState();
        if (!state) return;
        state.paused ? player.resume() : player.pause();
      });
    });

    player.addListener('player_state_changed', state => {
      if (!state) return;
      btn.textContent = state.paused ? '▶' : '⏸';
      status.textContent = state.paused ? 'Paused' : 'Playing…';
    });

    player.addListener('not_ready', () => { status.textContent = 'Spotify disconnected'; btn.disabled = true; });
    player.addListener('initialization_error', ({ message }) => { status.textContent = `Init error: ${message}`; });
    player.addListener('authentication_error', ({ message }) => {
      clearToken();
      status.textContent = `Auth expired — refresh the page.`;
    });
    player.addListener('account_error', () => { status.textContent = 'Spotify Premium required.'; });
    player.addListener('playback_error', ({ message }) => { status.textContent = `Playback error: ${message}`; });

    player.connect();
  }

  // ── PKCE / token helpers ──────────────────────────────────────────────────

  async function startSpotifyAuth(songId) {
    const verifier = generateRandomString(64);
    const challenge = await generateCodeChallenge(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);
    sessionStorage.setItem('pending_song_id', songId);

    const params = new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      response_type: 'code',
      redirect_uri: REDIRECT_URI,
      scope: 'streaming user-read-email user-read-private',
      code_challenge_method: 'S256',
      code_challenge: challenge,
    });
    location.href = `https://accounts.spotify.com/authorize?${params}`;
  }

  async function exchangeCode(code) {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: sessionStorage.getItem('pkce_verifier'),
      }),
    });
    return res.json();
  }

  function storeToken(data) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
  }

  function getValidToken() {
    const token = localStorage.getItem('spotify_token');
    const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
    return token && Date.now() < expiry ? token : null;
  }

  function clearToken() {
    localStorage.removeItem('spotify_token');
    localStorage.removeItem('spotify_token_expiry');
  }

  function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(length)))
      .map(x => chars[x % chars.length]).join('');
  }

  async function generateCodeChallenge(verifier) {
    const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  function loadSpotifySDK() {
    return new Promise(resolve => {
      window.onSpotifyWebPlaybackSDKReady = resolve;
      const s = document.createElement('script');
      s.src = 'https://sdk.scdn.co/spotify-player.js';
      document.head.appendChild(s);
    });
  }

  main();
</script>
</body>
</html>
