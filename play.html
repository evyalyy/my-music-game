<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.6;
      text-align: center;
      padding: 0 1rem;
    }

    #btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #1db954;
      cursor: pointer;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    #btn:active { transform: scale(0.93); }
    #btn:disabled { background: #444; cursor: default; }
  </style>
</head>
<body>

<div id="status">Loading…</div>
<button id="btn" disabled>▶</button>

<script>
  let SPOTIFY_CLIENT_ID;
  const REDIRECT_URI = `${location.origin}/play.html`;

  const status = document.getElementById('status');
  const btn = document.getElementById('btn');

  // ── Entry point ──────────────────────────────────────────────────────────

  async function main() {
    const config = await fetch('/config').then(r => r.json());
    SPOTIFY_CLIENT_ID = config.spotifyClientId;

    const params = new URLSearchParams(location.search);

    if (params.has('code')) {
      try {
        const rawState = params.get('state') || '';
        const state = JSON.parse(atob(rawState.replace(/-/g, '+').replace(/_/g, '/')));
        const { verifier, songId } = state;
        status.textContent = 'Connecting to Spotify…';
        const data = await exchangeCode(params.get('code'), verifier);
        if (data.error) { status.textContent = `Auth error: ${data.error} — ${data.error_description}`; return; }
        storeToken(data);
        history.replaceState({}, '', `${location.pathname}?id=${songId}`);
        await playSong(songId);
      } catch (e) {
        status.textContent = `Callback error: ${e}`;
      }
      return;
    }

    const songId = params.get('id');
    if (!songId) { status.textContent = 'No song ID in URL.'; return; }
    await playSong(songId);
  }

  async function playSong(songId) {
    let songs;
    try {
      songs = await fetch('songs.json').then(r => r.json());
    } catch (e) {
      status.textContent = `Error loading songs: ${e}`;
      return;
    }

    const song = songs.find(s => s.id === songId);
    if (!song) { status.textContent = `Song not found (id=${songId})`; return; }

    if (song.service === 'spotify') {
      await initSpotify(song);
    } else {
      await initYouTube(song);
    }
  }

  // ── YouTube ───────────────────────────────────────────────────────────────

  async function initYouTube(song) {
    const audio = new Audio();
    audio.preload = 'auto';

    audio.addEventListener('playing', () => { btn.textContent = '⏸'; status.textContent = 'Playing…'; });
    audio.addEventListener('pause',   () => { btn.textContent = '▶'; status.textContent = 'Paused'; });
    audio.addEventListener('ended',   () => { btn.textContent = '▶'; status.textContent = 'Ended'; });
    audio.addEventListener('error',   () => { status.textContent = 'Playback error'; });

    status.textContent = 'Fetching audio…';
    try {
      const data = await fetch(`/audio?ytId=${song.youtubeId}`).then(r => r.json());
      if (data.error) { status.textContent = `Error: ${data.error}`; return; }
      audio.src = data.url;
    } catch (e) {
      status.textContent = `Error: ${e}`;
      return;
    }

    status.textContent = 'Ready';
    btn.disabled = false;
    btn.addEventListener('click', () => audio.paused ? audio.play() : audio.pause());
  }

  // ── Spotify ───────────────────────────────────────────────────────────────

  async function initSpotify(song) {
    const token = getValidToken();
    if (!token) {
      status.textContent = 'Redirecting to Spotify…';
      await startSpotifyAuth(new URLSearchParams(location.search).get('id'));
      return;
    }

    status.textContent = 'Connecting to Spotify…';
    await loadSpotifySDK();

    const player = new Spotify.Player({
      name: 'Music Game',
      getOAuthToken: cb => cb(token),
      volume: 1.0,
    });

    player.addListener('ready', async ({ device_id }) => {
      const res = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${device_id}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris: [`spotify:track:${song.spotifyId}`] }),
      });
      if (res.status === 403) {
        status.textContent = 'Spotify Premium required.';
        return;
      }
      status.textContent = 'Ready';
      btn.disabled = false;
      btn.addEventListener('click', async () => {
        const state = await player.getCurrentState();
        if (!state) return;
        state.paused ? player.resume() : player.pause();
      });
    });

    player.addListener('player_state_changed', state => {
      if (!state) return;
      btn.textContent = state.paused ? '▶' : '⏸';
      status.textContent = state.paused ? 'Paused' : 'Playing…';
    });

    player.addListener('not_ready', () => { status.textContent = 'Spotify disconnected'; btn.disabled = true; });
    player.addListener('initialization_error', ({ message }) => { status.textContent = `Init error: ${message}`; });
    player.addListener('authentication_error', ({ message }) => {
      clearToken();
      status.textContent = `Auth expired — refresh the page.`;
    });
    player.addListener('account_error', () => { status.textContent = 'Spotify Premium required.'; });
    player.addListener('playback_error', ({ message }) => { status.textContent = `Playback error: ${message}`; });

    player.connect();
  }

  // ── PKCE / token helpers ──────────────────────────────────────────────────

  async function startSpotifyAuth(songId) {
    const verifier = generateRandomString(64);
    const challenge = await generateCodeChallenge(verifier);
    // Carry verifier + songId in state so any browser can complete the flow
    const state = btoa(JSON.stringify({ verifier, songId }))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

    const params = new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      response_type: 'code',
      redirect_uri: REDIRECT_URI,
      scope: 'streaming user-read-email user-read-private',
      code_challenge_method: 'S256',
      code_challenge: challenge,
      state,
    });
    location.href = `https://accounts.spotify.com/authorize?${params}`;
  }

  async function exchangeCode(code, verifier) {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier,
      }),
    });
    return res.json();
  }

  function storeToken(data) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
  }

  function getValidToken() {
    const token = localStorage.getItem('spotify_token');
    const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
    return token && Date.now() < expiry ? token : null;
  }

  function clearToken() {
    localStorage.removeItem('spotify_token');
    localStorage.removeItem('spotify_token_expiry');
  }

  function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(length)))
      .map(x => chars[x % chars.length]).join('');
  }

  async function generateCodeChallenge(verifier) {
    // Use crypto.subtle when available (HTTPS), fall back to pure-JS SHA-256
    let bytes;
    const data = new TextEncoder().encode(verifier);
    if (crypto.subtle) {
      bytes = new Uint8Array(await crypto.subtle.digest('SHA-256', data));
    } else {
      bytes = sha256(data);
    }
    return btoa(String.fromCharCode(...bytes))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  // Minimal SHA-256 for non-secure contexts (local HTTP dev)
  function sha256(data) {
    const K = [
      0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2,
    ];
    let h = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    const r = (x,n) => (x>>>n)|(x<<(32-n));
    const len = data.length;
    const bits = len * 8;
    const blocks = Math.ceil((len + 9) / 64);
    const buf = new Uint8Array(blocks * 64);
    buf.set(data);
    buf[len] = 0x80;
    new DataView(buf.buffer).setUint32(buf.length - 4, bits, false);
    for (let i = 0; i < blocks; i++) {
      const w = new Uint32Array(64);
      for (let j = 0; j < 16; j++) w[j] = new DataView(buf.buffer).getUint32((i*64)+j*4, false);
      for (let j = 16; j < 64; j++) {
        const s0 = r(w[j-15],7)^r(w[j-15],18)^(w[j-15]>>>3);
        const s1 = r(w[j-2],17)^r(w[j-2],19)^(w[j-2]>>>10);
        w[j] = (w[j-16]+s0+w[j-7]+s1)|0;
      }
      let [a,b,c,d,e,f,g,hh] = h;
      for (let j = 0; j < 64; j++) {
        const S1 = r(e,6)^r(e,11)^r(e,25);
        const ch = (e&f)^(~e&g);
        const t1 = (hh+S1+ch+K[j]+w[j])|0;
        const S0 = r(a,2)^r(a,13)^r(a,22);
        const maj = (a&b)^(a&c)^(b&c);
        const t2 = (S0+maj)|0;
        hh=g; g=f; f=e; e=(d+t1)|0; d=c; c=b; b=a; a=(t1+t2)|0;
      }
      h = [h[0]+a,h[1]+b,h[2]+c,h[3]+d,h[4]+e,h[5]+f,h[6]+g,h[7]+hh].map(x=>x|0);
    }
    const out = new Uint8Array(32);
    h.forEach((v,i) => new DataView(out.buffer).setUint32(i*4, v, false));
    return out;
  }

  function loadSpotifySDK() {
    return new Promise(resolve => {
      window.onSpotifyWebPlaybackSDKReady = resolve;
      const s = document.createElement('script');
      s.src = 'https://sdk.scdn.co/spotify-player.js';
      document.head.appendChild(s);
    });
  }

  main();
</script>
</body>
</html>
