<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiHitster</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --petrol: #0B2223;
      --amber: #F5A623;
      --amber-lo: #D9871A;
      --cream: #EDE9E0;
      --cream-dim: rgba(237, 233, 224, 0.55);
      --coral: #E86A5C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #081A1B;
      background-image: radial-gradient(120% 85% at 50% -15%, #16433D 0%, #0B2425 52%, #071718 100%);
      color: var(--cream); font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── Masthead: tuning scale ties the identity together ── */
    .masthead {
      position: fixed; top: 0; left: 0; right: 0; z-index: 5;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 16px 0 12px; pointer-events: none;
    }
    .scale {
      position: relative; width: 220px; height: 15px;
      background:
        repeating-linear-gradient(90deg, var(--cream-dim) 0 1px, transparent 1px 12px) bottom / 100% 7px no-repeat,
        repeating-linear-gradient(90deg, var(--cream-dim) 0 1px, transparent 1px 44px) bottom / 100% 13px no-repeat;
      opacity: 0.5;
    }
    .scale .needle {
      position: absolute; top: -3px; bottom: -3px; left: 62%; width: 2px;
      background: var(--amber); box-shadow: 0 0 8px var(--amber);
    }
    .wordmark {
      font: 700 10px/1 'Space Mono', monospace; letter-spacing: 0.32em;
      color: var(--cream-dim); text-transform: uppercase;
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; align-items: center;
            gap: 1.75rem; width: 100%; padding: 5rem 2rem 3rem; }
    .view.active { display: flex; }

    .hero {
      font-weight: 700; font-size: clamp(2.6rem, 15vw, 4.2rem); line-height: 0.86;
      letter-spacing: -0.02em; text-transform: uppercase; text-align: center;
    }
    .hero em { font-style: normal; color: var(--amber); }

    .status {
      font: 400 0.82rem/1.4 'Space Mono', monospace; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--cream-dim); text-align: center;
    }

    /* ── The dial: knurled tuning knob = play/start control ── */
    .dial {
      position: relative; width: 150px; height: 150px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 38% 32%, #FFD57C 0%, var(--amber) 48%, var(--amber-lo) 100%);
      box-shadow:
        0 0 0 10px rgba(245, 166, 35, 0.08),
        0 0 42px rgba(245, 166, 35, 0.32),
        inset 0 -7px 14px rgba(120, 70, 0, 0.42),
        inset 0 7px 12px rgba(255, 224, 160, 0.55);
      transition: transform 0.12s ease, box-shadow 0.3s ease;
    }
    .dial::before {
      content: ""; position: absolute; inset: -14px; border-radius: 50%; z-index: -1;
      background: repeating-conic-gradient(#0F302E 0 4deg, #1E524D 4deg 8deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 15px), #000 calc(100% - 15px));
              mask: radial-gradient(farthest-side, transparent calc(100% - 15px), #000 calc(100% - 15px));
      opacity: 0.9;
    }
    .dial:active { transform: scale(0.94); }
    .dial:focus-visible { outline: 3px solid var(--cream); outline-offset: 8px; }
    .dial:disabled {
      background: radial-gradient(circle at 40% 35%, #2C4F4A, #1B3B37);
      box-shadow: none; cursor: default;
    }
    .dial:disabled::before { opacity: 0.4; }

    /* Play/pause icon drawn in CSS (avoids emoji rendering differences) */
    .dial .ico {
      width: 0; height: 0; margin-left: 6px;
      border-style: solid; border-width: 18px 0 18px 30px;
      border-color: transparent transparent transparent var(--petrol);
    }
    .dial.is-playing .ico {
      width: 30px; height: 34px; margin-left: 0; border: none;
      border-left: 10px solid var(--petrol); border-right: 10px solid var(--petrol);
    }
    .dial:disabled .ico { border-left-color: #517069; border-right-color: #517069; }
    #view-player.playing .dial { animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 10px rgba(245,166,35,0.08), 0 0 42px rgba(245,166,35,0.30), inset 0 -7px 14px rgba(120,70,0,0.42), inset 0 7px 12px rgba(255,224,160,0.55); }
      50%      { box-shadow: 0 0 0 14px rgba(245,166,35,0.12), 0 0 60px rgba(245,166,35,0.55), inset 0 -7px 14px rgba(120,70,0,0.42), inset 0 7px 12px rgba(255,224,160,0.55); }
    }

    /* ── VU meter: animates while a track plays ── */
    .vu { display: flex; align-items: flex-end; gap: 5px; height: 46px; }
    .vu span {
      width: 5px; height: 22%; border-radius: 3px; opacity: 0.4;
      background: linear-gradient(var(--amber), var(--coral));
      transition: height 0.2s ease, opacity 0.2s ease;
    }
    #view-player.playing .vu span { opacity: 1; animation: bounce 0.9s ease-in-out infinite; }
    #view-player.playing .vu span:nth-child(1) { animation-duration: 1.1s; animation-delay: -0.2s; }
    #view-player.playing .vu span:nth-child(2) { animation-duration: 0.7s; animation-delay: -0.5s; }
    #view-player.playing .vu span:nth-child(3) { animation-duration: 1.0s; animation-delay: -0.1s; }
    #view-player.playing .vu span:nth-child(4) { animation-duration: 0.8s; animation-delay: -0.7s; }
    #view-player.playing .vu span:nth-child(5) { animation-duration: 1.2s; animation-delay: -0.3s; }
    #view-player.playing .vu span:nth-child(6) { animation-duration: 0.75s; animation-delay: -0.6s; }
    #view-player.playing .vu span:nth-child(7) { animation-duration: 1.05s; animation-delay: 0s; }
    @keyframes bounce { 0%, 100% { height: 18%; } 50% { height: 100%; } }

    /* ── Readout (status with a live indicator dot) ── */
    .readout { display: flex; align-items: center; gap: 0.6rem; }
    .readout .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--cream-dim); flex: none;
    }
    #view-player.playing .readout .dot { background: var(--amber); box-shadow: 0 0 10px var(--amber); }

    /* ── Secondary action ── */
    .btn-next {
      padding: 0.8rem 2rem; border: 1.5px solid var(--amber); border-radius: 2rem;
      background: transparent; color: var(--amber); cursor: pointer;
      font: 700 0.8rem/1 'Space Mono', monospace; letter-spacing: 0.18em; text-transform: uppercase;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .btn-next:active { background: var(--amber); color: var(--petrol); }

    /* ── Scanner viewport with corner brackets ── */
    .viewport {
      position: relative; width: 280px; padding: 12px; border-radius: 20px;
      background: rgba(11, 34, 35, 0.6);
      box-shadow: inset 0 0 0 1px rgba(237, 233, 224, 0.12), 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    .viewport::before, .viewport::after {
      content: ""; position: absolute; width: 26px; height: 26px; pointer-events: none;
      border: 2px solid var(--amber); border-radius: 3px;
    }
    .viewport::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
    .viewport::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }
    #reader { width: 100%; aspect-ratio: 1 / 1; border-radius: 12px; overflow: hidden;
              background: rgba(0, 0, 0, 0.25); }
    /* html5-qrcode injects a landscape <video>; crop it to fill the square frame */
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }

    #debug-input { display: none; flex-direction: column; align-items: center; gap: 0.6rem; width: 100%; }
    #debug-url {
      width: 90%; max-width: 400px; padding: 0.8rem 1rem; border-radius: 0.6rem;
      border: 1px solid rgba(237, 233, 224, 0.2); background: rgba(11, 34, 35, 0.8);
      color: var(--cream); font: 400 0.95rem 'Space Mono', monospace;
    }
    #debug-url:focus { outline: none; border-color: var(--amber); }

    @media (prefers-reduced-motion: reduce) {
      .dial, .vu span, .viewport { animation: none !important; }
    }
  </style>
</head>
<body>

<!-- Masthead -->
<div class="masthead">
  <div class="scale"><span class="needle"></span></div>
  <div class="wordmark">Scan · Listen · Guess</div>
</div>

<!-- Auth view -->
<div id="view-auth" class="view active">
  <h1 class="hero">Hi<em>hitster</em></h1>
  <button class="dial" id="start-btn" style="display: none;" aria-label="Start"><i class="ico"></i></button>
  <div class="status" id="auth-status">Loading…</div>
</div>

<!-- Scanner view -->
<div id="view-scanner" class="view">
  <div class="viewport"><div id="reader"></div></div>
  <div id="debug-input">
    <input id="debug-url" type="text" placeholder="Paste Spotify or YouTube URL…">
    <button class="btn-next" id="debug-play">Play</button>
  </div>
  <div class="status" id="scan-status">Scan a card</div>
</div>

<!-- Player view -->
<div id="view-player" class="view">
  <div class="vu"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <button class="dial" id="play-btn" disabled aria-label="Play or pause"><i class="ico"></i></button>
  <div class="readout"><span class="dot"></span><span class="status" id="play-status">Loading…</span></div>
  <button class="btn-next" id="next-btn">Next card</button>
</div>

<script>
  // ── State machine ─────────────────────────────────────────────────────────
  const VIEWS = ['auth', 'scanner', 'player'];
  let currentView = 'auth';

  function setState(view) {
    VIEWS.forEach(v => {
      document.getElementById(`view-${v}`).classList.toggle('active', v === view);
    });
    if (view === 'scanner') startScanner();
    if (currentView === 'scanner' && view !== 'scanner') pauseScanner();
    currentView = view;
  }

  // ── Keepalive ─────────────────────────────────────────────────────────────
  setInterval(() => fetch('/ping').catch(() => {}), 10 * 60 * 1000);

  // ── URL parser ────────────────────────────────────────────────────────────
  function parseTrackUrl(url) {
    url = (url || '').trim();
    let m;
    m = url.match(/open\.spotify\.com\/track\/([A-Za-z0-9]+)/);
    if (m) return { service: 'spotify', id: m[1] };
    m = url.match(/[?&]v=([A-Za-z0-9_-]{11})/);
    if (m) return { service: 'youtube', id: m[1] };
    m = url.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
    if (m) return { service: 'youtube', id: m[1] };
    return null;
  }

  // Self-tests (run once, logged to console)
  (function testParseTrackUrl() {
    const cases = [
      ['https://open.spotify.com/track/5sdQOyqq2IDhvmx2lHOpwd?si=abc', { service: 'spotify', id: '5sdQOyqq2IDhvmx2lHOpwd' }],
      ['https://www.youtube.com/watch?v=dQw4w9WgXcQ', { service: 'youtube', id: 'dQw4w9WgXcQ' }],
      ['https://youtu.be/dQw4w9WgXcQ', { service: 'youtube', id: 'dQw4w9WgXcQ' }],
      ['not a url', null],
      ['', null],
    ];
    let passed = 0;
    cases.forEach(([input, expected]) => {
      const result = parseTrackUrl(input);
      const ok = JSON.stringify(result) === JSON.stringify(expected);
      if (!ok) console.error('parseTrackUrl FAIL:', input, 'got', result, 'expected', expected);
      else passed++;
    });
    console.log(`parseTrackUrl: ${passed}/${cases.length} tests passed`);
  })();

  // ── Auth globals ──────────────────────────────────────────────────────────
  // No backend on GitHub Pages, so fall back to this public client id (not a secret — PKCE flow).
  const FALLBACK_SPOTIFY_CLIENT_ID = '10ab8dc8e73247598b1d55bb8e875a09';
  let SPOTIFY_CLIENT_ID;
  const REDIRECT_URI = `${location.origin}${location.pathname.slice(0, location.pathname.lastIndexOf('/') + 1)}play.html`;
  let spotifyToken = null;

  // ── PKCE helpers ──────────────────────────────────────────────────────────
  function getValidToken() {
    const token = localStorage.getItem('spotify_token');
    const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
    return token && Date.now() < expiry ? token : null;
  }

  function storeToken(data) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    spotifyToken = data.access_token;
  }

  function clearToken() {
    localStorage.removeItem('spotify_token');
    localStorage.removeItem('spotify_token_expiry');
    spotifyToken = null;
  }

  function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(length)))
      .map(x => chars[x % chars.length]).join('');
  }

  async function generateCodeChallenge(verifier) {
    const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function startSpotifyAuth() {
    const verifier = generateRandomString(64);
    const challenge = await generateCodeChallenge(verifier);
    const state = btoa(JSON.stringify({ verifier }))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    const params = new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      response_type: 'code',
      redirect_uri: REDIRECT_URI,
      scope: 'streaming user-read-email user-read-private',
      code_challenge_method: 'S256',
      code_challenge: challenge,
      state,
    });
    location.href = `https://accounts.spotify.com/authorize?${params}`;
  }

  async function exchangeCode(code, verifier) {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier,
      }),
    });
    return res.json();
  }

  function loadSpotifySDK() {
    return new Promise(resolve => {
      window.onSpotifyWebPlaybackSDKReady = resolve;
      const s = document.createElement('script');
      s.src = 'https://sdk.scdn.co/spotify-player.js';
      document.head.appendChild(s);
    });
  }

  // ── Spotify SDK ───────────────────────────────────────────────────────────
  let spotifyPlayer = null;
  let spotifyDeviceId = null;

  async function initSpotifySDK() {
    await loadSpotifySDK();
    spotifyPlayer = new Spotify.Player({
      name: 'HiHitster',
      getOAuthToken: cb => cb(spotifyToken),
      volume: 1.0,
    });
    spotifyPlayer.addListener('ready', ({ device_id }) => {
      spotifyDeviceId = device_id;
    });
    spotifyPlayer.addListener('authentication_error', () => {
      clearToken();
      document.getElementById('auth-status').textContent = 'Session expired — refresh.';
      setState('auth');
    });
    spotifyPlayer.addListener('account_error', () => {
      document.getElementById('auth-status').textContent = 'Spotify Premium required.';
      setState('auth');
    });
    spotifyPlayer.addListener('initialization_error', ({ message }) => {
      document.getElementById('auth-status').textContent = `Spotify init error: ${message}`;
      setState('auth');
    });
    spotifyPlayer.addListener('player_state_changed', state => {
      if (!state || currentTrack?.service !== 'spotify') return;
      setPlaying(!state.paused);
      document.getElementById('play-status').textContent = state.paused ? 'Paused' : 'Playing…';
    });
    await spotifyPlayer.connect();
  }

  // ── QR Scanner ────────────────────────────────────────────────────────────
  let qrScanner = null;
  const isDebug = new URLSearchParams(location.search).has('debug');

  // Nudge the camera to refocus. Toggling out of and back into continuous
  // focus forces a fresh autofocus pass on devices that otherwise lock focus.
  async function refocus() {
    if (!qrScanner) return;
    try {
      const modes = (qrScanner.getRunningTrackCapabilities().focusMode) || [];
      if (modes.includes('manual') && modes.includes('continuous')) {
        await qrScanner.applyVideoConstraints({ advanced: [{ focusMode: 'manual' }] });
      }
      if (modes.includes('continuous')) {
        await qrScanner.applyVideoConstraints({ advanced: [{ focusMode: 'continuous' }] });
      }
    } catch (e) { /* focus control unsupported — ignore */ }
  }

  function startScanner() {
    document.getElementById('scan-status').textContent = 'Scan a card';

    if (isDebug) {
      document.getElementById('debug-input').style.display = 'flex';
      document.getElementById('debug-url').value = '';
      document.getElementById('debug-play').onclick = () => {
        const url = document.getElementById('debug-url').value.trim();
        const track = parseTrackUrl(url);
        if (!track) {
          document.getElementById('scan-status').textContent = 'Unrecognised URL';
          return;
        }
        onTrackScanned(track);
      };
      return;
    }

    // Request the camera only once per session; on later visits just resume
    // scanning so the browser doesn't re-prompt for camera access each time.
    if (qrScanner) {
      qrScanner.resume();
      return;
    }

    qrScanner = new Html5Qrcode('reader');
    qrScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        const track = parseTrackUrl(decodedText);
        if (!track) {
          document.getElementById('scan-status').textContent = 'Not a music URL — try again';
          return;
        }
        pauseScanner();
        onTrackScanned(track);
      },
      () => {}  // per-frame errors — ignore
    ).then(() => {
      refocus();
      setInterval(refocus, 5000);
      document.getElementById('reader').onclick = refocus;  // tap to force focus
    }).catch(err => {
      document.getElementById('scan-status').textContent = `Camera error: ${err}`;
    });
  }

  function pauseScanner() {
    try { qrScanner?.pause(true); } catch (e) { /* already paused */ }
    document.getElementById('debug-input').style.display = 'none';
  }

  // Reflect playback state on the dial icon and drive the VU meter animation.
  function setPlaying(playing) {
    document.getElementById('play-btn').classList.toggle('is-playing', playing);
    document.getElementById('view-player').classList.toggle('playing', playing);
  }

  // ── YouTube audio ─────────────────────────────────────────────────────────
  const ytAudio = new Audio();
  ytAudio.addEventListener('playing', () => {
    setPlaying(true);
    document.getElementById('play-status').textContent = 'Playing…';
  });
  ytAudio.addEventListener('pause', () => {
    setPlaying(false);
    document.getElementById('play-status').textContent = 'Paused';
  });
  ytAudio.addEventListener('ended', () => {
    setPlaying(false);
    document.getElementById('play-status').textContent = 'Ended';
  });
  ytAudio.addEventListener('error', () => {
    document.getElementById('play-status').textContent = 'Playback error';
  });

  let currentTrack = null;

  async function onTrackScanned(track) {
    currentTrack = track;
    document.getElementById('play-status').textContent = 'Loading…';
    document.getElementById('play-btn').disabled = true;
    setPlaying(false);
    setState('player');

    if (track.service === 'spotify') {
      await playSpotify(track.id);
    } else if (track.service === 'youtube') {
      await playYouTube(track.id);
    }
  }

  async function playSpotify(trackId) {
    const res = await fetch(
      `https://api.spotify.com/v1/me/player/play?device_id=${spotifyDeviceId}`,
      {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${spotifyToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris: [`spotify:track:${trackId}`] }),
      }
    );
    if (res.status === 403) {
      document.getElementById('play-status').textContent = 'Spotify Premium required.';
      return;
    }
    // Icon/status are driven by player_state_changed so they reflect the SDK's
    // real state; on mobile the track may start paused until the first tap.
    document.getElementById('play-btn').disabled = false;
    document.getElementById('play-btn').onclick = async () => {
      const state = await spotifyPlayer.getCurrentState();
      if (!state) return;
      state.paused ? spotifyPlayer.resume() : spotifyPlayer.pause();
    };
  }

  async function playYouTube(videoId) {
    document.getElementById('play-status').textContent = 'Fetching audio…';
    try {
      const data = await fetch(`/audio?ytId=${videoId}`).then(r => r.json());
      if (data.error) { document.getElementById('play-status').textContent = `Error: ${data.error}`; return; }
      ytAudio.src = data.url;
      document.getElementById('play-btn').disabled = false;
      document.getElementById('play-btn').onclick = () => ytAudio.paused ? ytAudio.play() : ytAudio.pause();
      try {
        await ytAudio.play();
      } catch (e) {
        document.getElementById('play-status').textContent = 'Tap the dial to play';  // autoplay blocked
      }
    } catch (e) {
      document.getElementById('play-status').textContent = `Error: ${e}`;
    }
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    if (currentTrack?.service === 'youtube') {
      ytAudio.pause();
      ytAudio.src = '';
    } else if (currentTrack?.service === 'spotify' && spotifyPlayer) {
      spotifyPlayer.pause();
    }
    currentTrack = null;
    setPlaying(false);
    setState('scanner');
  });

  // ── Main entry point ──────────────────────────────────────────────────────
  async function main() {
    SPOTIFY_CLIENT_ID = await fetch('/config')
      .then(r => r.json())
      .then(config => config.spotifyClientId)
      .catch(() => FALLBACK_SPOTIFY_CLIENT_ID);

    const params = new URLSearchParams(location.search);

    // OAuth callback
    if (params.has('code')) {
      document.getElementById('auth-status').textContent = 'Connecting to Spotify…';
      const code = params.get('code');
      const rawState = params.get('state') || '';
      // Strip the code from the URL up-front so a reload / bfcache restore
      // can't re-run the exchange with an already-consumed code.
      history.replaceState({}, '', location.pathname);
      try {
        const { verifier } = JSON.parse(atob(rawState.replace(/-/g, '+').replace(/_/g, '/')));
        const data = await exchangeCode(code, verifier);
        if (data.error) {
          document.getElementById('auth-status').textContent =
            `Auth error: ${data.error}${data.error_description ? ' — ' + data.error_description : ''}`;
          return;
        }
        storeToken(data);
      } catch (e) {
        document.getElementById('auth-status').textContent = `Auth error: ${e}`;
        return;
      }
    }

    // Check existing token
    const token = getValidToken();
    if (!token) {
      document.getElementById('auth-status').textContent = 'Redirecting to Spotify…';
      await startSpotifyAuth();
      return;
    }
    spotifyToken = token;

    // Init Spotify SDK once
    document.getElementById('auth-status').textContent = 'Connecting to Spotify…';
    await initSpotifySDK();

    // Mobile browsers block audio until a user gesture, so gate the session
    // behind a Start tap that unlocks the SDK's audio element. Without this,
    // scanned tracks stay paused and can't be resumed.
    document.getElementById('auth-status').textContent = 'Ready to play';
    const startBtn = document.getElementById('start-btn');
    startBtn.style.display = 'flex';
    startBtn.onclick = async () => {
      try { await spotifyPlayer?.activateElement?.(); } catch (e) { /* unlock best-effort */ }
      setState('scanner');
    };
  }

  main();
</script>
</body>
</html>
