<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Game</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111; color: #fff; font-family: sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .view { display: none; flex-direction: column; align-items: center;
            gap: 1.5rem; width: 100%; padding: 2rem; }
    .view.active { display: flex; }
    .status { font-size: 1.1rem; opacity: 0.6; text-align: center; }
    .btn-round {
      width: 120px; height: 120px; border-radius: 50%; border: none;
      background: #1db954; color: #fff; cursor: pointer; font-size: 3rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
    }
    .btn-round:active { transform: scale(0.93); }
    .btn-round:disabled { background: #444; cursor: default; }
    .btn-next {
      padding: 0.75rem 2rem; border: 2px solid #fff; border-radius: 2rem;
      background: transparent; color: #fff; font-size: 1rem; cursor: pointer;
    }
    #reader { width: 300px; }
    #debug-input { display: none; flex-direction: column; align-items: center; gap: 0.5rem; width: 100%; }
    #debug-url { width: 90%; max-width: 400px; padding: 0.75rem; border-radius: 0.5rem;
                 border: 1px solid #555; background: #222; color: #fff; font-size: 1rem; }
  </style>
</head>
<body>

<!-- Auth view -->
<div id="view-auth" class="view active">
  <div class="status" id="auth-status">Loading…</div>
</div>

<!-- Scanner view -->
<div id="view-scanner" class="view">
  <div id="reader"></div>
  <div id="debug-input">
    <input id="debug-url" type="text" placeholder="Paste Spotify or YouTube URL…">
    <button class="btn-next" id="debug-play">Play</button>
  </div>
  <div class="status" id="scan-status">Scan a card</div>
</div>

<!-- Player view -->
<div id="view-player" class="view">
  <div class="status" id="play-status">Playing…</div>
  <button class="btn-round" id="play-btn" disabled>▶</button>
  <button class="btn-next" id="next-btn">Next Song</button>
</div>

<script>
  // ── State machine ─────────────────────────────────────────────────────────
  const VIEWS = ['auth', 'scanner', 'player'];
  let currentView = 'auth';

  function setState(view) {
    VIEWS.forEach(v => {
      document.getElementById(`view-${v}`).classList.toggle('active', v === view);
    });
    if (view === 'scanner') startScanner();
    if (currentView === 'scanner' && view !== 'scanner') stopScanner();
    currentView = view;
  }

  // ── Keepalive ─────────────────────────────────────────────────────────────
  setInterval(() => fetch('/ping').catch(() => {}), 10 * 60 * 1000);

  // ── URL parser ────────────────────────────────────────────────────────────
  function parseTrackUrl(url) {
    url = (url || '').trim();
    let m;
    m = url.match(/open\.spotify\.com\/track\/([A-Za-z0-9]+)/);
    if (m) return { service: 'spotify', id: m[1] };
    m = url.match(/[?&]v=([A-Za-z0-9_-]{11})/);
    if (m) return { service: 'youtube', id: m[1] };
    m = url.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
    if (m) return { service: 'youtube', id: m[1] };
    return null;
  }

  // Self-tests (run once, logged to console)
  (function testParseTrackUrl() {
    const cases = [
      ['https://open.spotify.com/track/5sdQOyqq2IDhvmx2lHOpwd?si=abc', { service: 'spotify', id: '5sdQOyqq2IDhvmx2lHOpwd' }],
      ['https://www.youtube.com/watch?v=dQw4w9WgXcQ', { service: 'youtube', id: 'dQw4w9WgXcQ' }],
      ['https://youtu.be/dQw4w9WgXcQ', { service: 'youtube', id: 'dQw4w9WgXcQ' }],
      ['not a url', null],
      ['', null],
    ];
    let passed = 0;
    cases.forEach(([input, expected]) => {
      const result = parseTrackUrl(input);
      const ok = JSON.stringify(result) === JSON.stringify(expected);
      if (!ok) console.error('parseTrackUrl FAIL:', input, 'got', result, 'expected', expected);
      else passed++;
    });
    console.log(`parseTrackUrl: ${passed}/${cases.length} tests passed`);
  })();

  // ── Auth globals ──────────────────────────────────────────────────────────
  // No backend on GitHub Pages, so fall back to this public client id (not a secret — PKCE flow).
  const FALLBACK_SPOTIFY_CLIENT_ID = '10ab8dc8e73247598b1d55bb8e875a09';
  let SPOTIFY_CLIENT_ID;
  const REDIRECT_URI = `${location.origin}${location.pathname.slice(0, location.pathname.lastIndexOf('/') + 1)}play.html`;
  let spotifyToken = null;

  // ── PKCE helpers ──────────────────────────────────────────────────────────
  function getValidToken() {
    const token = localStorage.getItem('spotify_token');
    const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
    return token && Date.now() < expiry ? token : null;
  }

  function storeToken(data) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    spotifyToken = data.access_token;
  }

  function clearToken() {
    localStorage.removeItem('spotify_token');
    localStorage.removeItem('spotify_token_expiry');
    spotifyToken = null;
  }

  function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(length)))
      .map(x => chars[x % chars.length]).join('');
  }

  async function generateCodeChallenge(verifier) {
    const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function startSpotifyAuth() {
    const verifier = generateRandomString(64);
    const challenge = await generateCodeChallenge(verifier);
    const state = btoa(JSON.stringify({ verifier }))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    const params = new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      response_type: 'code',
      redirect_uri: REDIRECT_URI,
      scope: 'streaming user-read-email user-read-private',
      code_challenge_method: 'S256',
      code_challenge: challenge,
      state,
    });
    location.href = `https://accounts.spotify.com/authorize?${params}`;
  }

  async function exchangeCode(code, verifier) {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier,
      }),
    });
    return res.json();
  }

  function loadSpotifySDK() {
    return new Promise(resolve => {
      window.onSpotifyWebPlaybackSDKReady = resolve;
      const s = document.createElement('script');
      s.src = 'https://sdk.scdn.co/spotify-player.js';
      document.head.appendChild(s);
    });
  }

  // ── Spotify SDK ───────────────────────────────────────────────────────────
  let spotifyPlayer = null;
  let spotifyDeviceId = null;

  async function initSpotifySDK() {
    await loadSpotifySDK();
    spotifyPlayer = new Spotify.Player({
      name: 'Music Game',
      getOAuthToken: cb => cb(spotifyToken),
      volume: 1.0,
    });
    spotifyPlayer.addListener('ready', ({ device_id }) => {
      spotifyDeviceId = device_id;
    });
    spotifyPlayer.addListener('authentication_error', () => {
      clearToken();
      document.getElementById('auth-status').textContent = 'Session expired — refresh.';
      setState('auth');
    });
    spotifyPlayer.addListener('account_error', () => {
      document.getElementById('auth-status').textContent = 'Spotify Premium required.';
      setState('auth');
    });
    spotifyPlayer.addListener('initialization_error', ({ message }) => {
      document.getElementById('auth-status').textContent = `Spotify init error: ${message}`;
      setState('auth');
    });
    await spotifyPlayer.connect();
  }

  // ── QR Scanner ────────────────────────────────────────────────────────────
  let qrScanner = null;
  const isDebug = new URLSearchParams(location.search).has('debug');

  function startScanner() {
    document.getElementById('scan-status').textContent = 'Scan a card';

    if (isDebug) {
      document.getElementById('debug-input').style.display = 'flex';
      document.getElementById('debug-url').value = '';
      document.getElementById('debug-play').onclick = () => {
        const url = document.getElementById('debug-url').value.trim();
        const track = parseTrackUrl(url);
        if (!track) {
          document.getElementById('scan-status').textContent = 'Unrecognised URL';
          return;
        }
        onTrackScanned(track);
      };
      return;
    }

    qrScanner = new Html5Qrcode('reader');
    qrScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        const track = parseTrackUrl(decodedText);
        if (!track) {
          document.getElementById('scan-status').textContent = 'Not a music URL — try again';
          return;
        }
        stopScanner();
        onTrackScanned(track);
      },
      () => {}  // per-frame errors — ignore
    ).catch(err => {
      document.getElementById('scan-status').textContent = `Camera error: ${err}`;
    });
  }

  function stopScanner() {
    if (qrScanner) {
      qrScanner.stop().catch(() => {});
      qrScanner = null;
    }
    document.getElementById('debug-input').style.display = 'none';
  }

  // ── YouTube audio ─────────────────────────────────────────────────────────
  const ytAudio = new Audio();
  ytAudio.addEventListener('playing', () => {
    document.getElementById('play-btn').textContent = '⏸';
    document.getElementById('play-status').textContent = 'Playing…';
  });
  ytAudio.addEventListener('pause', () => {
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-status').textContent = 'Paused';
  });
  ytAudio.addEventListener('ended', () => {
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-status').textContent = 'Ended';
  });
  ytAudio.addEventListener('error', () => {
    document.getElementById('play-status').textContent = 'Playback error';
  });

  let currentTrack = null;

  async function onTrackScanned(track) {
    currentTrack = track;
    document.getElementById('play-status').textContent = 'Loading…';
    document.getElementById('play-btn').disabled = true;
    setState('player');

    if (track.service === 'spotify') {
      await playSpotify(track.id);
    } else if (track.service === 'youtube') {
      await playYouTube(track.id);
    }
  }

  async function playSpotify(trackId) {
    const res = await fetch(
      `https://api.spotify.com/v1/me/player/play?device_id=${spotifyDeviceId}`,
      {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${spotifyToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris: [`spotify:track:${trackId}`] }),
      }
    );
    if (res.status === 403) {
      document.getElementById('play-status').textContent = 'Spotify Premium required.';
      return;
    }
    document.getElementById('play-btn').disabled = false;
    document.getElementById('play-btn').onclick = async () => {
      const state = await spotifyPlayer.getCurrentState();
      if (!state) return;
      state.paused ? spotifyPlayer.resume() : spotifyPlayer.pause();
    };
    spotifyPlayer.addListener('player_state_changed', state => {
      if (!state) return;
      document.getElementById('play-btn').textContent = state.paused ? '▶' : '⏸';
      document.getElementById('play-status').textContent = state.paused ? 'Paused' : 'Playing…';
    });
  }

  async function playYouTube(videoId) {
    document.getElementById('play-status').textContent = 'Fetching audio…';
    try {
      const data = await fetch(`/audio?ytId=${videoId}`).then(r => r.json());
      if (data.error) { document.getElementById('play-status').textContent = `Error: ${data.error}`; return; }
      ytAudio.src = data.url;
      document.getElementById('play-btn').disabled = false;
      document.getElementById('play-btn').onclick = () => ytAudio.paused ? ytAudio.play() : ytAudio.pause();
    } catch (e) {
      document.getElementById('play-status').textContent = `Error: ${e}`;
    }
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    if (currentTrack?.service === 'youtube') {
      ytAudio.pause();
      ytAudio.src = '';
    } else if (currentTrack?.service === 'spotify' && spotifyPlayer) {
      spotifyPlayer.pause();
    }
    currentTrack = null;
    document.getElementById('play-btn').textContent = '▶';
    setState('scanner');
  });

  // ── Main entry point ──────────────────────────────────────────────────────
  async function main() {
    SPOTIFY_CLIENT_ID = await fetch('/config')
      .then(r => r.json())
      .then(config => config.spotifyClientId)
      .catch(() => FALLBACK_SPOTIFY_CLIENT_ID);

    const params = new URLSearchParams(location.search);

    // OAuth callback
    if (params.has('code')) {
      document.getElementById('auth-status').textContent = 'Connecting to Spotify…';
      try {
        const rawState = params.get('state') || '';
        const { verifier } = JSON.parse(atob(rawState.replace(/-/g, '+').replace(/_/g, '/')));
        const data = await exchangeCode(params.get('code'), verifier);
        if (data.error) {
          document.getElementById('auth-status').textContent = `Auth error: ${data.error}`;
          return;
        }
        storeToken(data);
        history.replaceState({}, '', location.pathname);
      } catch (e) {
        document.getElementById('auth-status').textContent = `Auth error: ${e}`;
        return;
      }
    }

    // Check existing token
    const token = getValidToken();
    if (!token) {
      document.getElementById('auth-status').textContent = 'Redirecting to Spotify…';
      await startSpotifyAuth();
      return;
    }
    spotifyToken = token;

    // Init Spotify SDK once
    document.getElementById('auth-status').textContent = 'Connecting to Spotify…';
    await initSpotifySDK();

    setState('scanner');
  }

  main();
</script>
</body>
</html>
